  <script>    // Wait for the DOM to load
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById('contact-form');
    const successMessage = document.getElementById('success-message');

    // Make sure the form exists on the current page before adding the listener
    if (form) {
        form.addEventListener('submit', async function(event) {
            // 1. Stop the default Formspree redirect
            event.preventDefault(); 

            // 2. Gather the data from the inputs
            const data = new FormData(form);
            const action = form.action;

            try {
                // 3. Send the data in the background using fetch
                const response = await fetch(action, {
                    method: 'POST',
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                // 4. If successful, show the message and clear the form
                if (response.ok) {
                    successMessage.style.display = 'block';
                    form.reset(); 
                    
                    // Hide the success message after 5 seconds
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    alert("Oops! There was a problem submitting your form.");
                }
            } catch (error) {
                console.error("Form submission error:", error);
                alert("Oops! There was a network error. Please try again.");
            }
        });
    }
});
</script>
