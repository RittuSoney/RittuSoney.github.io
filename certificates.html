<!-- Main Body -->
 <section id="certificate">
        
            <h2 class="APHeading" >My Certificates<span style="color: rgb(69, 190, 241);">.</span></h2>
            
            <div id="cert-grid">
                </div>
        
    </section>
  <script>
    async function fetchCertificates() {
    const apiKey = 'AIzaSyBP-lVWOYEMdYIwo15y3pqpI-14-IhIVdc'; 
    const folderId = '17X7pg83kqop0CY5te-jgRXwPe15nj0sE'; 
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name)`;

    try {
        const response = await fetch(url);
        const data = await response.json();
        const grid = document.getElementById('cert-grid');

        if (data.error) {
            console.error("Google API Error:", data.error.message);
            grid.innerHTML = `<p style="color:red;">Failed to load certificates.</p>`;
            return; 
        }

        if (data.files && data.files.length > 0) {
            data.files.forEach(file => {
                const imgUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;
                const card = `
                    <div class="border p-2 rounded shadow-sm hover:shadow-lg transition-shadow">
                        <img src="${imgUrl}" alt="${file.name}" class="w-full h-48 object-cover rounded">
                        <p class="mt-2 text-center text-sm font-semibold truncate px-2">${file.name}</p>
                    </div>`;
                grid.innerHTML += card;
            });
        } else {
             grid.innerHTML = `<p>No certificates found.</p>`;
        }
    } catch (error) {
        console.error("Network error:", error);
    }
}

// Call the function when the page loads
document.addEventListener("DOMContentLoaded", () => {
    fetchCertificates();
});
  </script>
</body>
</html>
